<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klystron</title>

  <!-- Scramjet functionality scripts -->
  <script src="/scram/scramjet.all.js"></script>
  <script src="/baremux/index.js"></script>
  <script src="register-sw.js" defer></script>
  <script src="search.js" defer></script>
  <script src="index.js" defer></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 3.2rem;
      letter-spacing: -0.04em;
    }

    form {
      width: 100%;
      max-width: 640px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input:focus {
      border-color: #8bf;
      box-shadow: 0 0 0 4px rgba(136, 214, 255, 0.16);
    }

    #sj-error {
      color: #f88;
      margin-top: 10px;
      text-align: center;
    }

    #sj-error-code {
      color: #faa;
      white-space: pre-wrap;
      text-align: center;
      max-width: 640px;
    }

	#sj-frame {
	  width: 100%;
	  height: 100%;
	  border: none;
	  position: absolute;
	}
  </style>
</head>

<body>
  <h1>Infared</h1>

  <form id="sj-form">
    <input id="sj-search-engine" value="https://www.startpage.com/do/search?query=%s" type="hidden" />
    <input id="sj-address" type="text" placeholder="Enter a URL or search term" autocomplete="off" spellcheck="false" autocapitalize="off" autocorrect="off" autofocus="on" />
  </form>

  <p id="sj-error"></p>
  <pre id="sj-error-code"></pre>

  <script>
	window.addEventListener("DOMContentLoaded", async () => {
		const hash = window.location.hash;

		if (hash && hash.length > 1) {

			let decoded = "";

			try {
				decoded = decodeURIComponent(hash.slice(1));
			} catch (e) {
				error.textContent = "Invalid encoded URL in page hash.";
				errorCode.textContent = e.toString();
				return;
			}

			address.value = decoded;

			form.dispatchEvent(new Event("submit"));
		}
	});
  </script>
</body>
</html>
